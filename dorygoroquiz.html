<!DOCTYPE html>
<html lang="el">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Δορυφορο-Κουίζ 🛰️</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Nunito',sans-serif;background:#050b18;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:16px}
#sg{font-family:'Nunito',sans-serif;background:#070d1f;min-height:640px;padding:16px;color:#e8f0ff;position:relative;overflow:hidden;border-radius:20px;max-width:700px;width:100%;box-shadow:0 0 60px rgba(59,130,246,0.2)}
.stars-bg{position:absolute;inset:0;pointer-events:none}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle 3s infinite alternate}
@keyframes twinkle{0%{opacity:.15}100%{opacity:.9}}
.sat-anim{position:absolute;pointer-events:none;opacity:.65}
@keyframes orbit1{0%{transform:translateX(-120px) translateY(50px)}100%{transform:translateX(750px) translateY(15px)}}
@keyframes orbit2{0%{transform:translateX(750px) translateY(130px)}100%{transform:translateX(-120px) translateY(170px)}}
@keyframes orbit3{0%{transform:translateX(-120px) translateY(260px)}100%{transform:translateX(750px) translateY(300px)}}
@keyframes orbit4{0%{transform:translateX(750px) translateY(390px)}100%{transform:translateX(-120px) translateY(370px)}}
.s1{animation:orbit1 22s linear infinite}
.s2{animation:orbit2 30s linear infinite}
.s3{animation:orbit3 18s linear infinite}
.s4{animation:orbit4 36s linear infinite}
h1.title{text-align:center;font-size:24px;font-weight:900;color:#7dd3fc;margin-bottom:2px;position:relative;z-index:2}
.sub{text-align:center;font-size:12px;color:#93c5fd;margin-bottom:14px;font-weight:700;position:relative;z-index:2}
.content{position:relative;z-index:2}
.lvl-grid{display:grid;gap:12px}
.lc{background:rgba(255,255,255,0.06);border:2px solid rgba(255,255,255,0.15);border-radius:16px;padding:15px 18px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px}
.lc:hover{transform:scale(1.02)}
.lc.lv1{border-color:#22c55e}.lc.lv1:hover{background:rgba(34,197,94,0.12)}
.lc.lv2{border-color:#f59e0b}.lc.lv2:hover{background:rgba(245,158,11,0.12)}
.lc.lv3{border-color:#ef4444}.lc.lv3:hover{background:rgba(239,68,68,0.12)}
.li{font-size:34px;flex-shrink:0}
.ln{font-size:18px;font-weight:900;margin-bottom:2px}
.ld{font-size:12px;color:#93c5fd;font-weight:700}
.la{font-size:11px;font-weight:900;padding:3px 10px;border-radius:20px;display:inline-block;margin-top:4px}
.lv1 .la{background:rgba(34,197,94,0.2);color:#4ade80}
.lv2 .la{background:rgba(245,158,11,0.2);color:#fbbf24}
.lv3 .la{background:rgba(239,68,68,0.2);color:#f87171}
.sbar{display:flex;justify-content:space-between;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:12px;padding:8px 12px;margin-bottom:10px}
.si{text-align:center}
.sn{font-size:20px;font-weight:900;color:#7dd3fc}
.sl{font-size:10px;color:#93c5fd;font-weight:700}
.pbr{height:7px;background:rgba(255,255,255,0.1);border-radius:7px;margin-bottom:12px;overflow:hidden}
.pf{height:100%;border-radius:7px;transition:width .5s}
.f1{background:linear-gradient(90deg,#22c55e,#4ade80)}
.f2{background:linear-gradient(90deg,#f59e0b,#fbbf24)}
.f3{background:linear-gradient(90deg,#ef4444,#f97316)}
.qcard{background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.15);border-radius:14px;padding:15px 17px;margin-bottom:10px}
.qn{font-size:10px;color:#7dd3fc;font-weight:900;margin-bottom:5px;letter-spacing:1px}
.qt{font-size:16px;font-weight:900;color:#f0f8ff;line-height:1.5}
.opts{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:10px}
.ob{background:rgba(255,255,255,0.06);border:1.5px solid rgba(255,255,255,0.2);border-radius:12px;padding:13px 10px;font-family:'Nunito',sans-serif;font-size:13px;font-weight:700;color:#e8f0ff;cursor:pointer;transition:all .18s;text-align:left;line-height:1.4}
.ob:hover:not(:disabled){background:rgba(125,211,252,0.15);border-color:#7dd3fc;transform:scale(1.02)}
.ob.correct{background:rgba(34,197,94,0.2);border-color:#22c55e;color:#4ade80}
.ob.wrong{background:rgba(239,68,68,0.15);border-color:#ef4444;color:#f87171}
.ob:disabled{cursor:not-allowed}
.fb{padding:11px 14px;font-size:13px;font-weight:700;border-radius:11px;margin-bottom:9px;animation:popIn .3s ease;line-height:1.5}
@keyframes popIn{from{transform:scale(.85);opacity:0}to{transform:scale(1);opacity:1}}
.fb.cok{background:rgba(34,197,94,0.15);color:#4ade80;border:1.5px solid rgba(34,197,94,0.3)}
.fb.cwrong{background:rgba(239,68,68,0.12);color:#f87171;border:1.5px solid rgba(239,68,68,0.25)}
.nb{width:100%;padding:14px;border:none;border-radius:13px;font-family:'Nunito',sans-serif;font-size:16px;font-weight:900;color:#070d1f;cursor:pointer;transition:transform .18s;letter-spacing:.3px}
.nb:hover{transform:scale(1.02)}
.nb1{background:linear-gradient(135deg,#22c55e,#16a34a)}
.nb2{background:linear-gradient(135deg,#f59e0b,#d97706)}
.nb3{background:linear-gradient(135deg,#ef4444,#dc2626)}
.end{text-align:center;padding:18px 8px}
.trophy{font-size:58px;margin-bottom:10px;animation:tSpin .8s ease}
@keyframes tSpin{from{transform:scale(0) rotate(-15deg)}to{transform:scale(1) rotate(0)}}
.et{font-size:22px;font-weight:900;color:#7dd3fc;margin-bottom:6px}
.es{font-size:38px;font-weight:900;color:#f0f8ff;margin-bottom:10px}
.em{font-size:14px;color:#93c5fd;line-height:1.6;font-weight:700;margin-bottom:18px}
.brow{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}
.rbtn{border:none;border-radius:12px;padding:13px 26px;font-family:'Nunito',sans-serif;font-size:15px;font-weight:900;cursor:pointer}
.rbtn1{background:linear-gradient(135deg,#7dd3fc,#3b82f6);color:#070d1f}
.rbtn2{background:rgba(255,255,255,0.1);color:#e8f0ff;border:1.5px solid rgba(255,255,255,0.2)}
.badge{display:inline-block;padding:5px 16px;border-radius:20px;font-size:13px;font-weight:900;margin:4px}
.gold{background:rgba(251,191,36,0.2);color:#fbbf24;border:1.5px solid rgba(251,191,36,0.4)}
.silver{background:rgba(148,163,184,0.2);color:#94a3b8;border:1.5px solid rgba(148,163,184,0.35)}
.bronze{background:rgba(217,119,6,0.2);color:#d97706;border:1.5px solid rgba(217,119,6,0.35)}
.sat-info{background:rgba(125,211,252,0.08);border:1px solid rgba(125,211,252,0.2);border-radius:10px;padding:8px 14px;font-size:12px;color:#93c5fd;margin-bottom:10px;text-align:center;font-weight:700}
.lvl-badge{background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);border-radius:20px;padding:4px 12px;font-size:11px;font-weight:900}
</style>
</head>

<script>
const Q={
1:[
  {q:"Ποιος ήταν ο ΠΡΩΤΟΣ τεχνητός δορυφόρος στην ιστορία;",opts:["Telstar 1","Intelsat I","Sputnik 1","Hellas Sat"],c:2,fun:"Ο Sputnik 1 εκτοξεύτηκε στις 4 Οκτωβρίου 1957 από τη Σοβιετική Ένωση!",sat:"🛰️ Sputnik 1 (1957)"},
  {q:"Ποια χώρα εκτόξευσε τον Sputnik 1;",opts:["ΗΠΑ","Σοβιετική Ένωση (ΕΣΣΔ)","Γερμανία","Γαλλία"],c:1,fun:"Η ΕΣΣΔ κέρδισε τον πρώτο γύρο του Διαστημικού Αγώνα με τον Sputnik 1!",sat:"🛰️ Sputnik 1 (1957)"},
  {q:"Τι σχήμα είχε ο Sputnik 1;",opts:["Κύβος","Κύλινδρος","Σφαίρα με 4 κεραίες","Τρίγωνο"],c:2,fun:"Ο Sputnik 1 ήταν μεταλλική σφαίρα 58 εκ. με 4 μεγάλες κεραίες!",sat:"🛰️ Sputnik 1"},
  {q:"Τι είναι ένας τεχνητός δορυφόρος;",opts:["Ένα αστέρι","Αντικείμενο που περιστρέφεται γύρω από τη Γη","Ένα διαστημόπλοιο","Ένα τηλεσκόπιο"],c:1,fun:"Οι δορυφόροι περιστρέφονται γύρω από τη Γη ή άλλους πλανήτες!",sat:"🌍 Τι είναι δορυφόρος"},
  {q:"Τι κάνουν οι δορυφόροι επικοινωνίας;",opts:["Φωτογραφίζουν άστρα","Μεταδίδουν τηλεφωνικές κλήσεις και τηλεοπτικά σήματα","Μετρούν θερμοκρασία","Εξερευνούν πλανήτες"],c:1,fun:"Χάρη στους δορυφόρους βλέπουμε τηλεόραση και μιλάμε από οπουδήποτε!",sat:"📡 Δορυφόροι επικοινωνίας"},
  {q:"Τι είναι το GPS;",opts:["Σύστημα εντοπισμού θέσης μέσω δορυφόρων","Είδος ρουκέτας","Διαστημικός σταθμός","Τύπος τηλεσκοπίου"],c:0,fun:"Το GPS χρησιμοποιεί 24+ δορυφόρους για να βρει την ακριβή σου θέση!",sat:"📍 GPS"},
  {q:"Πώς λέγονται οι ελληνικοί δορυφόροι;",opts:["GreekSat","HellenicoSat","Hellas Sat","AthensSat"],c:2,fun:"Η Hellas Sat είναι η ελληνική εταιρεία δορυφόρων, με δορυφόρους Hellas Sat 2, 3 και 4!",sat:"🇬🇷 Hellas Sat"},
  {q:"Τι κάνουν οι μετεωρολογικοί δορυφόροι;",opts:["Φτιάχνουν τον καιρό","Παρακολουθούν και προβλέπουν τον καιρό","Ρίχνουν βροχή","Καθαρίζουν σύννεφα"],c:1,fun:"Χάρη στους μετεωρολογικούς δορυφόρους ξέρουμε τον καιρό εβδομάδες μπροστά!",sat:"⛅ Μετεωρολογικοί δορυφόροι"},
  {q:"Ο Telstar 1 ήταν δορυφόρος ποιου τύπου;",opts:["Μετεωρολογικός","Κατασκοπείας","Επικοινωνίας","Πλοήγησης"],c:2,fun:"Ο Telstar 1 ήταν ο πρώτος δορυφόρος που μετέδωσε ζωντανή τηλεόραση!",sat:"📺 Telstar 1 (1962)"},
  {q:"Πού βρίσκεται η έδρα της Hellas Sat;",opts:["Μόνο Κύπρος","Μόνο ΗΠΑ","Αίγυπτος","Ελλάδα / Κύπρος"],c:3,fun:"Η Hellas Sat έχει έδρα στην Αθήνα και τη Λευκωσία!",sat:"🇬🇷🇨🇾 Hellas Sat"}

2:[

  {q:"Τι είναι η τροχιά LEO;",opts:["Λεοντιακή τροχιά","Χαμηλή Τροχιά Γης (200-2000 χλμ)","Εξωηλιακή τροχιά","Ανθρώπινη τροχιά"],c:1,fun:"Στη LEO βρίσκονται ο Διεθνής Διαστημικός Σταθμός και τα Starlink!",sat:"🛰️ LEO Τροχιά"},
  {q:"Πόσοι δορυφόροι GPS χρειάζονται για εντοπισμό θέσης;",opts:["1","2","4","10"],c:2,fun:"Χρειάζονται τουλάχιστον 4 δορυφόροι GPS για τρισδιάστατο εντοπισμό!",sat:"📍 GPS Σύστημα"}
],
3:[
  {q:"Ποια ήταν η περίοδος τροχιάς του Sputnik 1;",opts:["32 λεπτά","96 λεπτά","6 ώρες","24 ώρες"],c:1,fun:"Ο Sputnik 1 ολοκλήρωνε μια πλήρη τροχιά γύρω από τη Γη σε 96,2 λεπτά!",sat:"🛰️ Sputnik 1 — Τεχνικά"},
  {q:"Ποια ήταν η χωρητικότητα του Intelsat I;",opts:["10 γραμμές","240 τηλεφωνικές γραμμές ή 1 τηλεοπτικό κανάλι","5.000 γραμμές","100.000 γραμμές"],c:1,fun:"240 γραμμές ήταν τεράστιο επίτευγμα για το 1965 — σήμερα υπάρχουν εκατομμύρια!",sat:"📡 Intelsat I — Χωρητικότητα"},
  {q:"Σε ποια θέση γεωστατικής τροχιάς βρίσκεται ο Hellas Sat;",opts:["19° Ανατολικά","29° Ανατολικά","39° Ανατολικά","49° Ανατολικά"],c:2,fun:"Οι Hellas Sat 2 και 3 βρίσκονται στη θέση 39° Ανατολικά — πάνω από τη Μέση Ανατολή!",sat:"🇬🇷 Hellas Sat — Θέση 39°E"},
  {q:"Ποια χρονιά εκτοξεύτηκε ο Hellas Sat 4;",opts:["2015","2018","2021","2023"],c:2,fun:"Ο Hellas Sat 4 εκτοξεύτηκε τον Αύγουστο του 2021 — ο πιο σύγχρονος ελληνικός δορυφόρος!",sat:"🇬🇷 Hellas Sat 4 (2021)"},
  {q:"Τι ήταν ιδιαίτερο για τον Telstar 1 ως προς τη χρηματοδότηση;",opts:["Ήταν κρατικός","Ήταν η πρώτη ιδιωτική/εμπορική εκτόξευση","Χρηματοδοτήθηκε από NASA","Ήταν στρατιωτικός"],c:1,fun:"Ο Telstar 1 χρηματοδοτήθηκε από την ιδιωτική AT&T — πρωτοποριακό για την εποχή!",sat:"📺 Telstar 1 — Ιδιωτική εκτόξευση"},
  {q:"Τι προκαλεί καθυστέρηση σήματος (latency) σε δορυφόρους GEO;",opts:["Η χαμηλή ταχύτητα","Η μεγάλη απόσταση (~35.786 χλμ)","Ο αέρας ατμόσφαιρας","Η περιστροφή Γης"],c:1,fun:"Το σήμα πηγαίνει 35.786χλμ πάνω & κάτω — αυτό δίνει καθυστέρηση ~240ms!",sat:"🛰️ GEO Latency"},
  {q:"Τι είναι τα CubeSats;",opts:["Κυβικοί δορυφόροι 10x10x10 εκ. για έρευνα","Στρατιωτικοί δορυφόροι","Διαστημικά τηλεσκόπια","Ρομπότ Άρη"],c:0,fun:"Τα CubeSats είναι φθηνά, μικρά — ιδανικά για πανεπιστημιακή έρευνα!",sat:"🔬 CubeSats"},
  {q:"Ποιος οργανισμός διαχειρίζεται τη Hellas Sat σήμερα;",opts:["Arabsat","ESA","NASA","Intelsat"],c:0,fun:"Η Arabsat (Σαουδική Αραβία) απέκτησε τον έλεγχο της Hellas Sat!",sat:"🇬🇷 Hellas Sat — Arabsat"},
  {q:"Ποια είναι η διαφορά LEO και GEO τροχιάς;",opts:["Δεν υπάρχει διαφορά","LEO: 200-2000χλμ / GEO: 35.786χλμ","LEO: 35.786χλμ / GEO: 200-2000χλμ","LEO πολική, GEO ισημερινή"],c:1,fun:"LEO = χαμηλή γρήγορη τροχιά. GEO = πολύ ψηλά, φαίνεται ακίνητη!",sat:"🛰️ LEO vs GEO"},
  {q:"Πόσα κιλά ζύγιζε ο Sputnik 1;",opts:["8,4 κιλά","83,6 κιλά","240 κιλά","1.000 κιλά"],c:1,fun:"Ο Sputnik 1 ζύγιζε μόλις 83,6 κιλά — σήμερα υπάρχουν δορυφόροι χιλιάδων κιλών!",sat:"🛰️ Sputnik 1 — Βάρος"}
]};

const LC={
  1:{name:"Αρχάριοι",icon:"🟢",age:"Έως 15 ετών",desc:"Βασικές γνώσεις δορυφόρων",pts:100,cb:150},
  2:{name:"Μεσαίοι",icon:"🟠",age:"Έως 17 ετών",desc:"Sputnik · Telstar · Intelsat · Hellas Sat",pts:150,cb:220},
  3:{name:"Ειδικοί",icon:"🔴",age:"Έως 18 ετών",desc:"Τεχνικές γνώσεις & λεπτομέρειες",pts:200,cb:300}
};

const DW=['Λάθος! Μάθε από αυτό! 📚','Προσπάθησε ξανά! 🎯','Μην τα παρατάς! ✨'];
let lv=0,cur=0,sc=0,cc=0,st=0,done=false,shuf=[];

function stars(){
  const c=document.getElementById('starbg');
  for(let i=0;i<70;i++){
    const d=document.createElement('div');
    d.className='star';
    d.style.cssText=`left:${Math.random()*100}%;top:${Math.random()*100}%;width:${Math.random()*2+1}px;height:${Math.random()*2+1}px;animation-delay:${Math.random()*4}s;animation-duration:${2+Math.random()*3}s`;
    c.appendChild(d);
  }
}

function menu(){
  lv=0;cur=0;sc=0;cc=0;st=0;
  document.getElementById('main').innerHTML=`
    <div class="sat-info">🛰️ Ανακάλυψε τους δορυφόρους: Sputnik 1 · Telstar 1 · Intelsat I · Hellas Sat 2/3/4 & άλλους!</div>
    <div class="lvl-grid">
      ${[1,2,3].map(l=>`
        <div class="lc lv${l}" onclick="go(${l})">
          <div class="li">${LC[l].icon}</div>
          <div>
            <div class="ln" style="color:${l==1?'#4ade80':l==2?'#fbbf24':'#f87171'}">${LC[l].name}</div>
            <div class="ld">${LC[l].desc}</div>
            <span class="la">👤 ${LC[l].age}</span>
          </div>
          <div style="font-size:20px;color:#334155;margin-left:auto">▶</div>
        </div>`).join('')}
    </div>`;
}

function go(l){
  lv=l;cur=0;sc=0;cc=0;st=0;
  shuf=[...Q[l]].sort(()=>Math.random()-.5);
  render();
}

function render(){
  const q=shuf[cur],lc=LC[lv];
  document.getElementById('main').innerHTML=`
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;flex-wrap:wrap">
      <span class="lvl-badge" style="color:${lv==1?'#4ade80':lv==2?'#fbbf24':'#f87171'}">${lc.icon} ${lc.name}</span>
      <div class="sbar" style="flex:1;margin:0">
        <div class="si"><div class="sn" id="sc">${sc}</div><div class="sl">ΣΚΟΡ</div></div>
        <div class="si"><div class="sn" id="cc">${cc}</div><div class="sl">ΣΩΣΤΑ</div></div>
        <div class="si"><div class="sn">${cur+1}/${shuf.length}</div><div class="sl">ΕΡΩΤΗΣΗ</div></div>
        <div class="si"><div class="sn" id="st">${st}</div><div class="sl">ΣΕΡΙ🔥</div></div>
      </div>
    </div>
    <div class="pbr"><div class="pf f${lv}" style="width:${cur/shuf.length*100}%"></div></div>
    <div class="sat-info">${q.sat}</div>
    <div class="qcard">
      <div class="qn">ΕΡΩΤΗΣΗ ${cur+1} ΑΠΟ ${shuf.length}</div>
      <div class="qt">${q.q}</div>
    </div>
    <div class="opts">
      ${q.opts.map((o,i)=>`<button class="ob" onclick="ans(${i})">${['🅐','🅑','🅒','🅓'][i]} ${o}</button>`).join('')}
    </div>
    <div id="fb"></div>
    <button class="nb nb${lv}" id="nb" style="display:none" onclick="nxt()">
      ${cur<shuf.length-1?'Επόμενη Ερώτηση →':'Δες τα Αποτελέσματα 🏆'}
    </button>`;
  done=false;
}

function ans(idx){
  if(done)return;done=true;
  const q=shuf[cur],lc=LC[lv];
  document.querySelectorAll('.ob').forEach(b=>b.disabled=true);
  const fb=document.getElementById('fb');
  if(idx===q.c){
    document.querySelectorAll('.ob')[idx].classList.add('correct');
    st++;cc++;
    const pts=st>2?lc.cb:lc.pts;sc+=pts;
    fb.className='fb cok';
    fb.innerHTML=`✅ Σωστό! ${st>2?'<span style="color:#fbbf24">COMBO x'+st+'! +'+pts+' πόντοι!</span>':'+'+pts+' πόντοι!'}<br><small style="opacity:.8">${q.fun}</small>`;
  }else{
    document.querySelectorAll('.ob')[idx].classList.add('wrong');
    document.querySelectorAll('.ob')[q.c].classList.add('correct');
    st=0;
    fb.className='fb cwrong';
    fb.innerHTML=`❌ Λάθος! Σωστή: <strong>${q.opts[q.c]}</strong><br><small style="opacity:.8">${q.fun}</small>`;
  }
  document.getElementById('sc').textContent=sc;
  document.getElementById('cc').textContent=cc;
  document.getElementById('st').textContent=st;
  document.getElementById('nb').style.display='block';
}

function nxt(){cur++;if(cur>=shuf.length){end();return;}render();}

function end(){
  const pct=Math.round(cc/shuf.length*100),lc=LC[lv];
  let em='🥉',cl='bronze',msg='';
  if(pct>=90){em='🏆';cl='gold';msg='Εκπληκτικό! Είσαι ειδικός στους δορυφόρους! Μέλλων αστρονόμος! 🌟';}
  else if(pct>=70){em='🥈';cl='silver';msg='Πολύ καλή δουλειά! Ξέρεις πολλά για τους δορυφόρους! 👏';}
  else if(pct>=50){em='🥉';cl='bronze';msg='Καλή προσπάθεια! Διάβασε λίγο ακόμα και θα τα πεις! 💪';}
  else{em='📡';cl='silver';msg='Μην το παρατάς! Ο κόσμος των δορυφόρων σε περιμένει! 😊';}
  document.getElementById('main').innerHTML=`
    <div class="end">
      <div class="trophy">${em}</div>
      <div style="margin-bottom:8px">
        <span class="lvl-badge" style="color:${lv==1?'#4ade80':lv==2?'#fbbf24':'#f87171'}">${lc.icon} Επίπεδο ${lc.name}</span>
      </div>
      <div class="et">Τέλος Παιχνιδιού!</div>
      <div class="es">${sc} <small style="font-size:17px;color:#475569">πόντοι</small></div>
      <span class="badge ${cl}">${cc}/${shuf.length} σωστές (${pct}%)</span>
      <div class="em" style="margin-top:12px">${msg}</div>
      <div class="brow">
        <button class="rbtn rbtn1" onclick="go(${lv})">🔄 Ξανά</button>
        <button class="rbtn rbtn2" onclick="menu()">📋 Επιλογή Επιπέδου</button>
      </div>
    </div>`;
}

stars();
menu();
</script>
</body>
</html>
