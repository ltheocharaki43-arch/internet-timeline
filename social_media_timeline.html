<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Social Media Evolution Timeline</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0f172a;
      color: #f1f5f9;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .page-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .page-header h1 {
      font-size: 28px;
      font-weight: 700;
      background: linear-gradient(135deg, #60a5fa, #a78bfa, #f472b6);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .page-header p {
      font-size: 14px;
      color: #94a3b8;
    }

    .wrap {
      max-width: 680px;
      margin: 0 auto;
    }

    /* ── HERO ── */
    .hero {
      position: relative;
      border-radius: 20px;
      overflow: hidden;
      margin-bottom: 1.25rem;
      min-height: 230px;
      display: flex;
      align-items: flex-end;
      padding: 1.75rem;
    }
    .hero-bg {
      position: absolute;
      inset: 0;
      transition: background 0.5s ease;
    }
    .hero-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(0,0,0,.78) 40%, rgba(0,0,0,.15));
    }
    .hero-logo {
      position: absolute;
      top: 1.25rem;
      right: 1.25rem;
      width: 68px;
      height: 68px;
      border-radius: 18px;
      background: rgba(255,255,255,.13);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1.5px solid rgba(255,255,255,.25);
      box-shadow: 0 4px 24px rgba(0,0,0,.3);
    }
    .hero-content { position: relative; z-index: 1; }
    .hero-badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 11px;
      border-radius: 20px;
      letter-spacing: .6px;
      margin-bottom: .5rem;
      color: #fff;
      border: 1px solid rgba(255,255,255,.35);
      background: rgba(255,255,255,.15);
      text-transform: uppercase;
    }
    .hero-title {
      font-size: 34px;
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
      margin-bottom: .35rem;
      text-shadow: 0 2px 16px rgba(0,0,0,.45);
    }
    .hero-year {
      font-size: 13px;
      color: rgba(255,255,255,.6);
      letter-spacing: 1px;
    }

    /* ── STATS ── */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 1rem;
    }
    .stat {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: .85rem 1rem;
    }
    .stat-label {
      font-size: 10px;
      color: #64748b;
      letter-spacing: .8px;
      text-transform: uppercase;
      margin-bottom: 4px;
    }
    .stat-val {
      font-size: 16px;
      font-weight: 600;
      color: #f1f5f9;
    }

    /* ── DESCRIPTION CARD ── */
    .desc-card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 16px;
      padding: 1.4rem 1.5rem;
      margin-bottom: 1rem;
    }
    .desc-text {
      font-size: 15px;
      color: #cbd5e1;
      line-height: 1.8;
      margin-bottom: 1rem;
    }
    .fact-box {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      padding: .9rem 1rem;
      border-radius: 10px;
      border-left-width: 3px;
      border-left-style: solid;
      margin-bottom: 1rem;
    }
    .fact-icon { font-size: 16px; flex-shrink: 0; margin-top: 2px; }
    .fact-text { font-size: 13px; line-height: 1.65; color: #94a3b8; }
    .fact-text strong { color: #f1f5f9; font-weight: 600; }

    .feature-pills {
      display: flex;
      gap: 7px;
      flex-wrap: wrap;
    }
    .pill {
      font-size: 12px;
      padding: 4px 11px;
      border-radius: 20px;
      border-width: 1px;
      border-style: solid;
      font-weight: 500;
      transition: transform .15s;
      cursor: default;
    }
    .pill:hover { transform: translateY(-1px); }

    /* ── TIMELINE SCROLL ── */
    .tl-scroll {
      display: flex;
      gap: 0;
      padding: .5rem 0 1rem;
      overflow-x: auto;
      scrollbar-width: none;
      margin-bottom: 1rem;
    }
    .tl-scroll::-webkit-scrollbar { display: none; }

    .era {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      min-width: 72px;
      flex: 1;
      position: relative;
      padding-top: 4px;
      transition: opacity .2s;
    }
    .era::after {
      content: '';
      position: absolute;
      top: 22px;
      left: 50%;
      width: 100%;
      height: 2px;
      background: #334155;
      z-index: 0;
      transition: background .3s;
    }
    .era:last-child::after { display: none; }
    .era.done::after { background: #475569; }

    .era-dot {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      border: 2px solid #475569;
      background: #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 1;
      transition: all .25s;
      overflow: hidden;
    }
    .era-label {
      font-size: 10px;
      font-weight: 500;
      color: #64748b;
      margin-top: 6px;
      letter-spacing: .3px;
      transition: color .2s;
    }
    .era.active .era-label { font-weight: 700; }

    /* ── NAV ROW ── */
    .nav-row {
      display: flex;
      gap: 8px;
      justify-content: space-between;
      align-items: center;
      margin-bottom: .75rem;
    }
    .nav-btn {
      font-size: 13px;
      padding: 7px 16px;
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #334155;
      border-radius: 8px;
      cursor: pointer;
      font-weight: 500;
      transition: all .2s;
    }
    .nav-btn:hover:not(:disabled) { background: #334155; color: #f1f5f9; }
    .nav-btn:disabled { opacity: .35; cursor: default; }
    .nav-info { font-size: 12px; color: #475569; }

    /* ── PROGRESS ── */
    .progress {
      height: 4px;
      border-radius: 4px;
      background: #1e293b;
      overflow: hidden;
    }
    .progress-fill {
      height: 100%;
      border-radius: 4px;
      transition: width .45s ease, background .45s ease;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <h1>📱 Social Media Evolution</h1>
    <p>Από το 1997 μέχρι σήμερα — η ιστορία της ψηφιακής επικοινωνίας</p>
  </div>

  <div class="wrap">

    <div class="hero" id="hero">
      <div class="hero-bg" id="heroBg"></div>
      <div class="hero-overlay"></div>
      <div class="hero-logo" id="heroLogo"></div>
      <div class="hero-content">
        <div class="hero-badge" id="heroBadge"></div>
        <div class="hero-title" id="heroTitle"></div>
        <div class="hero-year" id="heroYear"></div>
      </div>
    </div>

    <div class="stats-row">
      <div class="stat"><div class="stat-label">Ίδρυση</div><div class="stat-val" id="sYear"></div></div>
      <div class="stat"><div class="stat-label">Χρήστες</div><div class="stat-val" id="sUsers"></div></div>
      <div class="stat"><div class="stat-label">Έδρα</div><div class="stat-val" id="sHq"></div></div>
    </div>

    <div class="desc-card">
      <p class="desc-text" id="desc"></p>
      <div class="fact-box" id="factBox">
        <span class="fact-icon">💡</span>
        <span class="fact-text" id="fact"></span>
      </div>
      <div class="feature-pills" id="pills"></div>
    </div>

    <div class="tl-scroll" id="tl"></div>

    <div class="nav-row">
      <button class="nav-btn" id="prevBtn" onclick="go(-1)">← Προηγούμενο</button>
      <span class="nav-info" id="navInfo"></span>
      <button class="nav-btn" id="nextBtn" onclick="go(1)">Επόμενο →</button>
    </div>

    <div class="progress"><div class="progress-fill" id="prog"></div></div>

  </div>

  <script>
    const platforms = [
      {
        year: "1997", name: "SixDegrees", badge: "ΠΡΩΤΟΠΌΡΟΣ",
        color: "#6C5CE7",
        bg: "linear-gradient(135deg,#6C5CE7 0%,#a29bfe 100%)",
        hq: "Νέα Υόρκη", users: "3.5 εκ.",
        desc: "Το πρώτο πραγματικό κοινωνικό δίκτυο στην ιστορία. Επέτρεπε τη δημιουργία προφίλ και λίστας φίλων, χρόνια πριν η έννοια «social media» καν υπήρχε. Λειτούργησε μέχρι το 2001.",
        fact: "<strong>Ήξερες ότι;</strong> Βασίστηκε στη θεωρία των \"έξι βαθμών διαχωρισμού\" — ότι κάθε δύο άνθρωποι χωρίζονται από μόνο έξι γνωριμίες.",
        features: ["Προφίλ", "Λίστα φίλων", "Αποστολή μηνύματος"],
        logo: `<svg viewBox="0 0 44 44" width="44" height="44"><circle cx="22" cy="22" r="20" fill="#6C5CE7"/><text x="22" y="29" text-anchor="middle" font-size="18" fill="white" font-weight="bold" font-family="sans-serif">6°</text></svg>`
      },
      {
        year: "2003", name: "LinkedIn", badge: "ΕΠΑΓΓΕΛΜΑΤΙΚΌ",
        color: "#0A66C2",
        bg: "linear-gradient(135deg,#0A66C2 0%,#0077b5 50%,#00a0dc 100%)",
        hq: "Sunnyvale, CA", users: "800 εκ.+",
        desc: "Η αρχή της επαγγελματικής δικτύωσης. Δημιούργησε ένα ψηφιακό βιογραφικό για κάθε επαγγελματία και άλλαξε τον τρόπο πρόσληψης. Εξαγοράστηκε από τη Microsoft το 2016 για $26 δισ.",
        fact: "<strong>Ήξερες ότι;</strong> Είναι το παλαιότερο μεγάλο κοινωνικό δίκτυο που εξακολουθεί να λειτουργεί, παρόν σε 200+ χώρες με 800+ εκατ. μέλη.",
        features: ["CV Online", "Job Listings", "B2B Δικτύωση", "Συστάσεις"],
        logo: `<svg viewBox="0 0 44 44" width="44" height="44"><rect width="44" height="44" rx="9" fill="#0A66C2"/><rect x="8" y="15" width="7" height="21" fill="white"/><circle cx="11.5" cy="10.5" r="4" fill="white"/><path d="M19 15h7v3c1-2 3.5-3.5 6.5-3.5 5.5 0 9 3.5 9 10.5V36h-7V26c0-3-1-5-3.5-5S27 23 27 26v10h-8V15z" fill="white"/></svg>`
      },
      {
        year: "2004", name: "Facebook", badge: "ΠΑΓΚΌΣΜΙΟΣ ΓΊΓΑΝΤΑΣ",
        color: "#1877F2",
        bg: "linear-gradient(135deg,#1877F2 0%,#42a5f5 50%,#1565c0 100%)",
        hq: "Menlo Park, CA", users: "3 δισ.+",
        desc: "Άλλαξε τον κόσμο και τον τρόπο που επικοινωνούμε. Από κοιτίδα του Harvard έγινε η μεγαλύτερη ψηφιακή κοινότητα στον πλανήτη. Σήμερα ανήκει στον όμιλο Meta με αποτίμηση $1+ τρισ.",
        fact: "<strong>Ήξερες ότι;</strong> Ξεκίνησε ως «Facemash» — ιστοσελίδα που έβαζε φοιτητές να συγκρίνουν φωτογραφίες συναδέλφων τους. Ο Zuckerberg παρ' ολίγο να αποβληθεί από το Harvard.",
        features: ["News Feed", "Likes", "Groups", "Marketplace", "Stories"],
        logo: `<svg viewBox="0 0 44 44" width="44" height="44"><rect width="44" height="44" rx="9" fill="#1877F2"/><path d="M30 22h-5v-3.5c0-1.4.3-2.5 2.3-2.5H30V11.5h-4.5C20 11.5 18 14.5 18 18.5V22h-3.5v6H18v15h7V28h4l1-6z" fill="white"/></svg>`
      },
      {
        year: "2005", name: "YouTube", badge: "VIDEO REVOLUTION",
        color: "#FF0000",
        bg: "linear-gradient(135deg,#FF0000 0%,#ff4444 50%,#cc0000 100%)",
        hq: "San Bruno, CA", users: "2.7 δισ.+",
        desc: "Η πλατφόρμα που έφερε το βίντεο σε κάθε οθόνη. Έδωσε φωνή σε δημιουργούς παγκοσμίως και επανακαθόρισε τη διασκέδαση, την εκπαίδευση και τη δημοσιογραφία.",
        fact: "<strong>Ήξερες ότι;</strong> Το πρώτο βίντεο «Me at the zoo» (18 δευτ.) ανεβήκε τον Απρίλιο 2005. Η Google αγόρασε το YouTube τον Οκτώβριο 2006 για μόλις $1.65 δισ. — μία από τις καλύτερες εξαγορές στην ιστορία.",
        features: ["Streaming", "Shorts", "YouTube TV", "Premium", "Analytics"],
        logo: `<svg viewBox="0 0 44 44" width="44" height="44"><rect width="44" height="44" rx="9" fill="#FF0000"/><path d="M37 22c0 4-.5 6.5-1.5 7.7-.9 1.2-2.2 2-3.8 2.1-3 .3-6.3.4-9.7.4s-6.7-.1-9.7-.4c-1.6-.1-2.9-.9-3.8-2.1C7.5 28.5 7 26 7 22s.5-6.5 1.5-7.7c.9-1.2 2.2-2 3.8-2.1C15.3 11.9 18.6 11.8 22 11.8s6.7.1 9.7.4c1.6.1 2.9.9 3.8 2.1C36.5 15.5 37 18 37 22z" fill="white"/><polygon points="18,16 18,28 28,22" fill="#FF0000"/></svg>`
      },
      {
        year: "2006", name: "Twitter / X", badge: "MICROBLOGGING",
        color: "#1DA1F2",
        bg: "linear-gradient(135deg,#14171A 0%,#1DA1F2 60%,#0d8ecf 100%)",
        hq: "San Francisco, CA", users: "550 εκ.+",
        desc: "Η δύναμη της άμεσης είδησης και των 280 χαρακτήρων. Επαναστάτησε στη δημοσιογραφία, την πολιτική και τον δημόσιο διάλογο. Εξαγοράστηκε από τον Elon Musk το 2022 για $44 δισ. και μετονομάστηκε σε X.",
        fact: "<strong>Ήξερες ότι;</strong> Το hashtag (#) εφευρέθηκε από χρήστη το 2007 — αρχικά η εταιρεία αρνήθηκε να το ενσωματώσει. Σήμερα χρησιμοποιείται σε κάθε πλατφόρμα.",
        features: ["Tweets", "Hashtags", "Retweets", "Spaces", "Communities"],
        logo: `<svg viewBox="0 0 44 44" width="44" height="44"><rect width="44" height="44" rx="9" fill="#000"/><path d="M24.5 19.8L33.8 9H31.5L23.5 18.3 17.3 9H9.5L19.3 23.5 9.5 35H11.8L20.2 25.2 26.7 35H34.5L24.5 19.8ZM21.3 23.9L20.3 22.4 12.4 10.8H16.2L22.3 19.7 23.3 21.2 31.7 33.3H27.9L21.3 23.9Z" fill="white"/></svg>`
      },
      {
        year: "2010", name: "Instagram", badge: "VISUAL CULTURE",
        color: "#E1306C",
        bg: "linear-gradient(135deg,#f09433 0%,#e6683c 25%,#dc2743 50%,#cc2366 75%,#bc1888 100%)",
        hq: "San Francisco, CA", users: "2 δισ.+",
        desc: "Η εποχή της εικόνας, των φίλτρων και των influencers. Το Instagram μετέτρεψε καθημερινές στιγμές σε τέχνη και δημιούργησε ολόκληρη οικονομία creators αξίας δισεκατομμυρίων.",
        fact: "<strong>Ήξερες ότι;</strong> Το Facebook αγόρασε το Instagram το 2012 για $1 δισ. — μια συμφωνία που θεωρήθηκε τότε υπερβολική. Σήμερα αποτιμάται σε $100+ δισ.",
        features: ["Stories", "Reels", "Shopping", "Filters", "DMs"],
        logo: `<svg viewBox="0 0 44 44" width="44" height="44"><defs><linearGradient id="igG2" x1="0" y1="1" x2="1" y2="0"><stop offset="0%" stop-color="#f09433"/><stop offset="25%" stop-color="#e6683c"/><stop offset="50%" stop-color="#dc2743"/><stop offset="75%" stop-color="#cc2366"/><stop offset="100%" stop-color="#bc1888"/></linearGradient></defs><rect width="44" height="44" rx="11" fill="url(#igG2)"/><rect x="10" y="10" width="24" height="24" rx="7" fill="none" stroke="white" stroke-width="2.5"/><circle cx="22" cy="22" r="6" fill="none" stroke="white" stroke-width="2.5"/><circle cx="30" cy="14" r="2" fill="white"/></svg>`
      },
      {
        year: "2016", name: "TikTok", badge: "AI ALGORITHM ERA",
        color: "#EE1D52",
        bg: "linear-gradient(135deg,#010101 0%,#2d2d2d 30%,#69C9D0 65%,#EE1D52 100%)",
        hq: "Culver City, CA", users: "1.5 δισ.+",
        desc: "Σύντομα βίντεο, παντοδύναμοι αλγόριθμοι AI και μια νέα γενιά δημιουργών. Το TikTok επαναπροσδιόρισε τι σημαίνει viral και ανάγκασε όλες τις πλατφόρμες να αντιγράψουν το format Reels/Shorts.",
        fact: "<strong>Ήξερες ότι;</strong> Το TikTok χρειάστηκε λιγότερα από 5 χρόνια για να φτάσει το 1 δισ. χρήστες — ταχύτερο από κάθε άλλη πλατφόρμα στην ιστορία. Ο αλγόριθμός του θεωρείται ο πιο εξελιγμένος στον κόσμο.",
        features: ["For You Page", "Duets", "LIVE", "Sounds", "Creator Fund"],
        logo: `<svg viewBox="0 0 44 44" width="44" height="44"><rect width="44" height="44" rx="9" fill="#010101"/><path d="M31 9.5c0 4.8 3.2 8.7 7.5 10.2v4.8c-2.5 0-5.2-.7-7.5-2.2v10C31 38.5 26.2 43 20.5 43S10 38.5 10 32.3s4.8-10.7 10.5-10.7c.5 0 1.1 0 1.6.1v5c-.5-.1-1-.2-1.6-.2-3.2 0-5.8 2.7-5.8 5.8s2.6 5.8 5.8 5.8 5.8-2.7 5.8-5.8V9.5H31z" fill="#EE1D52"/><path d="M29.5 8c0 4.8 3.2 8.7 7.5 10.2v4.8c-2.5 0-5.2-.7-7.5-2.2v10C29.5 37 24.7 41.5 19 41.5S8.5 37 8.5 30.8s4.8-10.7 10.5-10.7c.5 0 1.1 0 1.6.1v5c-.5-.1-1-.2-1.6-.2-3.2 0-5.8 2.7-5.8 5.8s2.6 5.8 5.8 5.8 5.8-2.7 5.8-5.8V8H29.5z" fill="white"/></svg>`
      }
    ];

    let cur = 0;
    const tl = document.getElementById('tl');

    platforms.forEach((p, i) => {
      const el = document.createElement('div');
      el.className = 'era' + (i === 0 ? ' active' : '');
      el.innerHTML = `<div class="era-dot" id="dot${i}">${p.logo}</div><div class="era-label">${p.year}</div>`;
      el.onclick = () => show(i);
      tl.appendChild(el);
    });

    function show(i) {
      cur = i;
      const p = platforms[i];

      document.getElementById('heroBg').style.background = p.bg;
      document.getElementById('heroBadge').textContent = p.badge;
      document.getElementById('heroTitle').textContent = p.name;
      document.getElementById('heroYear').textContent = 'Ίδρυση: ' + p.year;
      document.getElementById('heroLogo').innerHTML = p.logo;

      document.getElementById('sYear').textContent = p.year;
      document.getElementById('sUsers').textContent = p.users;
      document.getElementById('sHq').textContent = p.hq;
      document.getElementById('desc').textContent = p.desc;
      document.getElementById('fact').innerHTML = p.fact;

      const factBox = document.getElementById('factBox');
      factBox.style.background = p.color + '18';
      factBox.style.borderLeftColor = p.color;

      const pillsEl = document.getElementById('pills');
      pillsEl.innerHTML = p.features.map(f =>
        `<span class="pill" style="background:${p.color}22;border-color:${p.color}55;color:${p.color === '#010101' ? '#94a3b8' : p.color}">${f}</span>`
      ).join('');

      const pct = ((i + 1) / platforms.length * 100).toFixed(0);
      document.getElementById('prog').style.width = pct + '%';
      document.getElementById('prog').style.background = p.color;
      document.getElementById('navInfo').textContent = (i + 1) + ' / ' + platforms.length;
      document.getElementById('prevBtn').disabled = i === 0;
      document.getElementById('nextBtn').disabled = i === platforms.length - 1;

      document.querySelectorAll('.era').forEach((el, j) => {
        el.className = 'era' + (j === i ? ' active' : j < i ? ' done' : '');
        const dot = el.querySelector('.era-dot');
        const lbl = el.querySelector('.era-label');
        if (j === i) {
          dot.style.border = '2.5px solid ' + p.color;
          dot.style.boxShadow = '0 0 0 5px ' + p.color + '33';
          lbl.style.color = p.color === '#010101' ? '#f1f5f9' : p.color;
        } else if (j < i) {
          dot.style.border = '2px solid ' + platforms[j].color + '88';
          dot.style.boxShadow = 'none';
          lbl.style.color = '#64748b';
        } else {
          dot.style.border = '2px solid #475569';
          dot.style.boxShadow = 'none';
          lbl.style.color = '#64748b';
        }
      });
    }

    function go(d) { show(Math.max(0, Math.min(platforms.length - 1, cur + d))); }

    show(0);
  </script>

</body>
</html>
